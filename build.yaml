include:
  # Totem
  - board: xiao_ble//zmk
    shield: totem_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: totem-dongle-left
  - board: xiao_ble//zmk
    shield: totem_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: totem-dongle-right
  - board: xiao_ble//zmk
    shield: totem_dongle prospector_adapter
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    snippet: zmk-usb-logging studio-rpc-usb-uart
    artifact-name: totem-dongle

  # Corne
  - board: nice_nano//zmk
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano//zmk
    shield: corne_right nice_view_adapter nice_view

  # Kometa
  - board: nice_nano//zmk
    shield: kometa_left
  - board: nice_nano//zmk
    shield: kometa_right

  # Settings reset
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: xiao_reset_settings
  - board: nice_nano//zmk
    shield: nice_nano_reset_settings
